<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Devices - Camp Tutor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #eee; 
              min-height: 100vh; padding-bottom: 70px; }
        
        .header { background: #0f0f23; padding: 12px 15px; border-bottom: 2px solid #00d9ff;
                 position: sticky; top: 0; z-index: 100; }
        .header h1 { color: #00d9ff; font-size: 1.2rem; }
        
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        
        h1 { color: #00d9ff; text-align: center; margin-bottom: 15px; font-size: 1.3rem; }
        h2 { color: #ff6b6b; margin: 15px 0 10px; font-size: 1rem; }
        
        .card { background: #0f0f23; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        
        .nav { display: flex; gap: 5px; overflow-x: auto; padding: 8px 10px; background: #0a0a1a;
              position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; justify-content: space-around; }
        .nav a { color: #aaa; text-decoration: none; padding: 10px 8px; border-radius: 5px;
                 font-size: 0.75rem; white-space: nowrap; text-align: center; flex: 1; }
        .nav a:hover, .nav a.active { background: #00d9ff; color: #1a1a2e; }
        
        .summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .summary-item { background: #0f0f23; padding: 12px; border-radius: 8px; text-align: center; }
        .summary-item .count { font-size: 1.5rem; font-weight: bold; }
        .summary-item .label { color: #888; font-size: 0.75rem; margin-top: 3px; }
        .summary-item.ok .count { color: #00ff00; }
        .summary-item.error .count { color: #ff4757; }
        
        .device-row { display: flex; justify-content: space-between; align-items: center;
                    padding: 12px; background: #1a1a2e; border-radius: 8px; margin-bottom: 10px;
                    flex-wrap: wrap; gap: 10px; }
        .device-info { flex: 1; min-width: 150px; }
        .device-name { font-weight: bold; font-size: 0.95rem; }
        .device-desc { color: #888; font-size: 0.75rem; margin-top: 3px; }
        .device-status { display: flex; align-items: center; gap: 8px; }
        
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; }
        .status-badge.ok { background: #00ff00; color: #000; }
        .status-badge.error { background: #ff4757; color: white; }
        .status-badge.testing { background: #ffa502; color: #000; }
        .status-badge.unknown { background: #666; color: #fff; }
        
        button { padding: 12px 16px; background: #00d9ff; color: #1a1a2e;
                 border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem;
                 font-weight: bold; touch-action: manipulation; }
        button:hover { opacity: 0.8; }
        button:active { transform: scale(0.96); }
        button:disabled { background: #666; cursor: not-allowed; }
        .btn-test { padding: 8px 12px; font-size: 0.8rem; background: #0f3460; color: #fff; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-full { width: 100%; margin-bottom: 10px; }
        
        .log-area { background: #0a0a15; padding: 12px; border-radius: 8px;
                   font-family: monospace; font-size: 0.75rem; max-height: 150px;
                   overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
        .log-entry { margin-bottom: 4px; }
        .log-entry.info { color: #00d9ff; }
        .log-entry.success { color: #00ff00; }
        .log-entry.error { color: #ff4757; }
        
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 4px;
                       overflow: hidden; margin-top: 10px; }
        .progress-bar .fill { height: 100%; background: #00d9ff; transition: width 0.3s; }
        
        @media (min-width: 768px) {
            body { padding-bottom: 0; }
            .nav { position: static; overflow-x: visible; gap: 10px; justify-content: flex-start; }
            .nav a { flex: none; padding: 10px 15px; font-size: 0.9rem; }
            .container { padding: 20px; }
            .summary { grid-template-columns: repeat(4, 1fr); }
            .device-row { flex-wrap: nowrap; }
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔌 Device Status</h1>
    </div>
    
    <div class="container">
        <div class="summary">
            <div class="summary-item ok">
                <div class="count" id="countOk">0</div>
                <div class="label">Working</div>
            </div>
            <div class="summary-item error">
                <div class="count" id="countError">0</div>
                <div class="label">Issues</div>
            </div>
            <div class="summary-item">
                <div class="count" id="countTesting">0</div>
                <div class="label">Testing</div>
            </div>
            <div class="summary-item">
                <div class="count" id="countTotal">0</div>
                <div class="label">Total</div>
            </div>
        </div>

        <div class="card">
            <h2>Hardware</h2>
            <div id="deviceList">
                <div class="device-row" data-device="speaker">
                    <div class="device-info">
                        <div class="device-name">Speaker</div>
                        <div class="device-desc">Audio output</div>
                    </div>
                    <div class="device-status">
                        <span class="status-badge unknown" id="status-speaker">?</span>
                        <button class="btn-test" onclick="testDevice('speaker')">Test</button>
                    </div>
                </div>
                
                <div class="device-row" data-device="microphone">
                    <div class="device-info">
                        <div class="device-name">Microphone</div>
                        <div class="device-desc">Audio input</div>
                    </div>
                    <div class="device-status">
                        <span class="status-badge unknown" id="status-microphone">?</span>
                        <button class="btn-test" onclick="testDevice('microphone')">Test</button>
                    </div>
                </div>
                
                <div class="device-row" data-device="camera">
                    <div class="device-info">
                        <div class="device-name">Camera</div>
                        <div class="device-desc">Pi Camera</div>
                    </div>
                    <div class="device-status">
                        <span class="status-badge unknown" id="status-camera">?</span>
                        <button class="btn-test" onclick="testDevice('camera')">Test</button>
                    </div>
                </div>
                
                <div class="device-row" data-device="lcd">
                    <div class="device-info">
                        <div class="device-name">LCD Display</div>
                        <div class="device-desc">Nokia 5110</div>
                    </div>
                    <div class="device-status">
                        <span class="status-badge unknown" id="status-lcd">?</span>
                        <button class="btn-test" onclick="testDevice('lcd')">Test</button>
                    </div>
                </div>
                
                <div class="device-row" data-device="rex">
                    <div class="device-info">
                        <div class="device-name">REX Robot</div>
                        <div class="device-desc">Serial/I2C</div>
                    </div>
                    <div class="device-status">
                        <span class="status-badge unknown" id="status-rex">?</span>
                        <button class="btn-test" onclick="testDevice('rex')">Test</button>
                    </div>
                </div>
                
                <div class="device-row" data-device="wifi">
                    <div class="device-info">
                        <div class="device-name">WiFi</div>
                        <div class="device-desc">Wireless</div>
                    </div>
                    <div class="device-status">
                        <span class="status-badge unknown" id="status-wifi">?</span>
                        <button class="btn-test" onclick="testDevice('wifi')">Test</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <button class="btn-full" onclick="testAllDevices()" id="testAllBtn">Test All Devices</button>
            <div class="progress-bar" id="progressBar" style="display: none;">
                <div class="fill" id="progressFill" style="width: 0%;"></div>
            </div>
        </div>

        <div class="card">
            <h2>Test Log</h2>
            <button class="btn-test" onclick="clearLog()" style="margin-bottom: 10px; background:#ff4757;">Clear</button>
            <div class="log-area" id="logArea">
                <div class="log-entry info">[System] Ready</div>
            </div>
        </div>
    </div>
    
    <nav class="nav">
        <a href="/">🏠 Home</a>
        <a href="/commands">⚡ Commands</a>
        <a href="/students">👨‍🎓 Students</a>
        <a href="/courses">📚 Courses</a>
        <a href="/wifi">📶 WiFi</a>
    </nav>

    <script>
        const deviceTests = {
            speaker: async () => {
                addLog('Testing speaker...', 'info');
                const response = await fetch('/api/device/test/speaker', {method: 'POST'});
                const data = await response.json();
                if (data.success) { addLog('✓ ' + data.message, 'success'); return {ok: true}; }
                else { addLog('✗ ' + data.error, 'error'); return {ok: false}; }
            },
            microphone: async () => {
                addLog('Testing mic...', 'info');
                const response = await fetch('/api/device/test/microphone', {method: 'POST'});
                const data = await response.json();
                if (data.success) { addLog('✓ ' + data.message, 'success'); return {ok: true}; }
                else { addLog('✗ ' + data.error, 'error'); return {ok: false}; }
            },
            camera: async () => {
                addLog('Testing camera...', 'info');
                const response = await fetch('/api/device/test/camera', {method: 'POST'});
                const data = await response.json();
                if (data.success) { addLog('✓ ' + data.message, 'success'); return {ok: true}; }
                else { addLog('✗ ' + data.error, 'error'); return {ok: false}; }
            },
            lcd: async () => {
                addLog('Testing LCD...', 'info');
                const response = await fetch('/api/device/test/lcd', {method: 'POST'});
                const data = await response.json();
                if (data.success) { addLog('✓ ' + data.message, 'success'); return {ok: true}; }
                else { addLog('✗ ' + data.error, 'error'); return {ok: false}; }
            },
            rex: async () => {
                addLog('Testing REX...', 'info');
                const response = await fetch('/api/device/test/rex', {method: 'POST'});
                const data = await response.json();
                if (data.success) { addLog('✓ ' + data.message, 'success'); return {ok: true}; }
                else { addLog('✗ ' + data.error, 'error'); return {ok: false}; }
            },
            wifi: async () => {
                addLog('Testing WiFi...', 'info');
                const response = await fetch('/api/wifi/status');
                const data = await response.json();
                if (data.connected) { addLog('✓ WiFi connected', 'success'); return {ok: true}; }
                else { addLog('✗ WiFi disconnected', 'error'); return {ok: false}; }
            },
            gpio: async () => {
                addLog('Testing GPIO...', 'info');
                return {ok: true, message: 'GPIO available'};
            },
            i2c: async () => {
                addLog('Testing I2C...', 'info');
                return {ok: true, message: 'I2C available'};
            }
        };

        function addLog(msg, type) {
            const logArea = document.getElementById('logArea');
            const time = new Date().toLocaleTimeString();
            logArea.innerHTML += '<div class="log-entry ' + type + '">[' + time + '] ' + msg + '</div>';
            logArea.scrollTop = logArea.scrollHeight;
        }

        function clearLog() {
            document.getElementById('logArea').innerHTML = '<div class="log-entry info">[System] Cleared</div>';
        }

        function updateBadge(device, status) {
            const badge = document.getElementById('status-' + device);
            if (!badge) return;
            badge.className = 'status-badge ' + status;
            badge.textContent = status === 'ok' ? 'OK' : status === 'error' ? 'ERR' : status === 'testing' ? '...' : '?';
        }

        async function testDevice(device) {
            updateBadge(device, 'testing');
            try {
                const result = await deviceTests[device]();
                updateBadge(device, result.ok ? 'ok' : 'error');
                updateCounts();
            } catch(e) {
                updateBadge(device, 'error');
                addLog('Error: ' + e, 'error');
            }
        }

        function updateCounts() {
            let ok = 0, err = 0, test = 0, total = 0;
            document.querySelectorAll('.status-badge').forEach(b => {
                total++;
                if (b.classList.contains('ok')) ok++;
                else if (b.classList.contains('error')) err++;
                else if (b.classList.contains('testing')) test++;
            });
            document.getElementById('countOk').textContent = ok;
            document.getElementById('countError').textContent = err;
            document.getElementById('countTesting').textContent = test;
            document.getElementById('countTotal').textContent = total;
        }

        async function testAllDevices() {
            const btn = document.getElementById('testAllBtn');
            btn.disabled = true;
            document.getElementById('progressBar').style.display = 'block';
            
            const devices = Object.keys(deviceTests);
            let completed = 0;
            
            for (const device of devices) {
                await testDevice(device);
                completed++;
                document.getElementById('progressFill').style.width = (completed / devices.length * 100) + '%';
            }
            
            btn.disabled = false;
        }
    </script>
</body>
</html>
