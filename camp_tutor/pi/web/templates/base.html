<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Camp Tutor{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding-bottom: 70px;
        }
        
        /* Mobile-first header */
        .header {
            background: #0f0f23;
            padding: 12px 15px;
            border-bottom: 2px solid #00d9ff;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 {
            color: #00d9ff;
            font-size: 1.2rem;
        }
        .header .tagline {
            color: #666;
            font-size: 0.8rem;
        }
        
        /* Fixed bottom nav for mobile */
        .nav {
            background: #0a0a1a;
            padding: 8px 10px;
            display: flex;
            gap: 5px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: space-around;
        }
        .nav a {
            color: #aaa;
            text-decoration: none;
            padding: 10px 8px;
            border-radius: 5px;
            font-size: 0.75rem;
            white-space: nowrap;
            text-align: center;
            flex: 1;
            min-width: 50px;
        }
        .nav a:hover, .nav a.active {
            background: #00d9ff;
            color: #1a1a2e;
        }
        
        /* Main content */
        .container { 
            padding: 15px; 
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Mobile cards */
        .card {
            background: #0f0f23;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .card h2 {
            color: #ff6b6b;
            margin-bottom: 12px;
            font-size: 1rem;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        
        /* Status bar */
        .status-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background: #1a1a2e;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .status-item { text-align: center; }
        .status-label { color: #666; font-size: 0.75rem; }
        .status-value {
            color: #00d9ff;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .status-value.ok { color: #2ed573; }
        .status-value.error { color: #ff4757; }
        
        /* Touch-friendly buttons */
        .btn {
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #00d9ff; color: #1a1a2e; }
        .btn-success { background: #2ed573; color: #1a1a2e; }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-secondary { background: #333; color: #fff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Button groups */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn-group .btn { width: 100%; }
        
        /* Form controls */
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #00d9ff;
            cursor: pointer;
        }
        
        /* Tables - scrollable on mobile */
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 300px;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #333;
            font-size: 0.9rem;
        }
        th { color: #ff6b6b; font-size: 0.85rem; }
        
        /* Progress bar */
        .progress-bar {
            background: #333;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #00d9ff, #2ed573);
            height: 100%;
            transition: width 0.3s;
        }
        
        /* Device status */
        .device-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.75rem;
        }
        .device-status.connected { background: #2ed573; color: #1a1a2e; }
        .device-status.disconnected { background: #ff4757; color: #fff; }
        
        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        
        /* Stat box */
        .stat-box {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-box .num {
            font-size: 1.5rem;
            color: #00d9ff;
            font-weight: bold;
        }
        .stat-box .label { color: #666; margin-top: 5px; font-size: 0.85rem; }
        
        /* Value display */
        .value-display {
            text-align: center;
            color: #00d9ff;
            font-size: 1.2rem;
            margin-top: 8px;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #666;
        }
        
        /* Control group */
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            color: #aaa;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            color: #444;
            padding: 15px;
            font-size: 0.75rem;
            display: none;
        }
        
        code {
            background: #1a1a2e;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.85rem;
        }
        
        /* Desktop adjustments */
        @media (min-width: 768px) {
            body { padding-bottom: 0; }
            .nav { 
                position: static; 
                overflow-x: visible;
                gap: 10px;
                padding: 10px 20px;
                justify-content: flex-start;
            }
            .nav a {
                padding: 10px 20px;
                font-size: 0.9rem;
                flex: none;
                min-width: auto;
            }
            .container { padding: 20px; }
            .card { padding: 20px; }
            .status-bar { 
                grid-template-columns: repeat(4, 1fr);
                padding: 15px;
            }
            .btn-group { 
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }
            .footer { display: block; }
            .stat-box .num { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎓 Camp Tutor</h1>
        <span class="tagline">Refugee Education</span>
    </div>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <nav class="nav">
        <a href="/" class="{% if page == 'dashboard' %}active{% endif %}">🏠 Home</a>
        <a href="/commands" class="{% if page == 'commands' %}active{% endif %}">⚡ Commands</a>
        <a href="/students" class="{% if page == 'students' %}active{% endif %}">👨‍🎓 Students</a>
        <a href="/courses" class="{% if page == 'courses' %}active{% endif %}">📚 Courses</a>
        <a href="/progress" class="{% if page == 'progress' %}active{% endif %}">📈 Progress</a>
        <a href="/wifi" class="{% if page == 'wifi' %}active{% endif %}">📶 WiFi</a>
    </nav>
    
    <div class="footer">
        Camp Tutor - Refugee Education Robot
    </div>
    
    <script>
        {% block scripts %}{% endblock %}
    </script>
</body>
</html>
