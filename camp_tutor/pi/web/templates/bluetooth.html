<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bluetooth Settings - Camp Tutor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #eee; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #00d9ff; text-align: center; margin-bottom: 20px; }
        h2 { color: #00d9ff; margin-top: 20px; }
        .card { background: #0f0f23; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .card h2 { color: #ff6b6b; margin-bottom: 15px; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; }
        .form-group input, .form-group select { width: 100%; padding: 12px;
                 background: #1a1a2e; border: 1px solid #333; color: #eee;
                 border-radius: 6px; font-size: 16px; }
        button, .btn { padding: 12px 24px; background: #00d9ff; color: #1a1a2e;
                    border: none; border-radius: 6px; cursor: pointer;
                    font-size: 16px; font-weight: bold; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #666; cursor: not-allowed; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-small { padding: 8px 16px; font-size: 14px; }
        .status { padding: 15px; background: #1a1a2e; border-radius: 8px; margin-bottom: 20px; }
        .status.connected { border-left: 4px solid #00ff00; }
        .status.disconnected { border-left: 4px solid #ff4757; }
        .status.scanning { border-left: 4px solid #ffa502; }
        .device-list { margin-top: 15px; }
        .device-item { padding: 12px; background: #1a1a2e; border-radius: 8px;
                      margin-bottom: 10px; display: flex; justify-content: space-between;
                      align-items: center; }
        .device-name { font-weight: bold; }
        .device-address { color: #888; font-size: 12px; }
        .device-signal { color: #00d9ff; }
        .alert { padding: 12px; background: #1a1a2e; border-radius: 8px; margin-bottom: 15px; }
        .alert.success { border-left: 4px solid #00ff00; }
        .alert.error { border-left: 4px solid #ff4757; }
        .spinner { display: inline-block; width: 20px; height: 20px;
                   border: 3px solid #333; border-top: 3px solid #00d9ff;
                   border-radius: 50%; animation: spin 1s linear infinite; }
        .toggle-container { display: flex; align-items: center; gap: 15px; margin-top: 15px; }
        .toggle { width: 50px; height: 26px; background: #333; border-radius: 13px;
                  position: relative; cursor: pointer; }
        .toggle.active { background: #00d9ff; }
        .toggle::after { content: ''; width: 22px; height: 22px; background: white;
                        border-radius: 50%; position: absolute; top: 2px; left: 2px;
                        transition: 0.3s; }
        .toggle.active::after { left: 26px; }
        .nav { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .nav a { flex: 1; min-width: 100px; padding: 10px; background: #0f0f23;
                 color: #aaa; text-decoration: none; text-align: center;
                 border-radius: 5px; }
        .nav a:hover, .nav a.active { background: #00d9ff; color: #1a1a2e; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bluetooth Settings</h1>
        
        <nav class="nav">
            <a href="/" style="background: transparent;">Dashboard</a>
            <a href="/students" style="background: transparent;">Students</a>
            <a href="/wifi" style="background: transparent;">WiFi</a>
            <a href="/bluetooth" class="active" style="background: #00d9ff; color: #1a1a2e;">Bluetooth</a>
            <a href="/devices" style="background: transparent;">Devices</a>
            <a href="/config" style="background: transparent;">Settings</a>
        </nav>

        <div class="card">
            <h2>Bluetooth Status</h2>
            <div id="btStatus">
                <div class="status disconnected">
                    <strong>Bluetooth</strong> - Click "Scan" to find devices
                </div>
            </div>
            
            <div class="toggle-container">
                <div class="toggle" id="btToggle" onclick="toggleBluetooth()"></div>
                <span>Enable Bluetooth</span>
            </div>
        </div>

        <div class="card">
            <h2>Scan for Devices</h2>
            <button class="btn" onclick="scanDevices()" id="scanBtn">Scan for Devices</button>
            <div id="scanSpinner" class="spinner" style="display: none; margin-left: 10px;"></div>
            
            <div class="device-list" id="deviceList">
                <p style="color: #888; margin-top: 10px;">Click "Scan for Devices" to find nearby Bluetooth devices.</p>
            </div>
        </div>

        <div class="card">
            <h2>Paired Devices</h2>
            <div class="device-list" id="pairedList">
                <p style="color: #888;">No paired devices yet.</p>
            </div>
        </div>
    </div>

    <script>
        let btEnabled = false;

        function toggleBluetooth() {
            btEnabled = !btEnabled;
            document.getElementById('btToggle').classList.toggle('active', btEnabled);
            updateStatus();
        }

        function updateStatus() {
            const statusEl = document.getElementById('btStatus');
            if (btEnabled) {
                statusEl.innerHTML = '<div class="status scanning"><strong>Bluetooth Enabled</strong><br><small>Ready to scan</small></div>';
            } else {
                statusEl.innerHTML = '<div class="status disconnected"><strong>Bluetooth Disabled</strong><br><small>Toggle to enable</small></div>';
            }
        }

        function scanDevices() {
            if (!btEnabled) {
                alert('Please enable Bluetooth first');
                return;
            }
            
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('scanSpinner').style.display = 'inline-block';
            
            fetch('/api/bluetooth/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({duration: 10})
            })
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('deviceList');
                if (data.devices && data.devices.length > 0) {
                    list.innerHTML = data.devices.map(d => 
                        '<div class="device-item">' +
                        '<div>' +
                        '<div class="device-name">' + (d.name || 'Unknown Device') + '</div>' +
                        '<div class="device-address">' + d.address + '</div>' +
                        '</div>' +
                        '<button class="btn btn-small" onclick="connectDevice(\'' + d.address + '\')">Connect</button>' +
                        '</div>'
                    ).join('');
                } else {
                    list.innerHTML = '<p style="color: #888;">No devices found. Make sure your devices are in pairing mode.</p>';
                }
            })
            .catch(err => {
                document.getElementById('deviceList').innerHTML = '<p style="color: #ff4757;">Error scanning devices</p>';
            })
            .finally(() => {
                document.getElementById('scanBtn').disabled = false;
                document.getElementById('scanSpinner').style.display = 'none';
            });
        }

        function connectDevice(address) {
            fetch('/api/bluetooth/connect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({address: address})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Connected successfully!');
                    loadPairedDevices();
                } else {
                    alert('Connection failed. Make sure the device is in pairing mode.');
                }
            })
            .catch(err => {
                alert('Connection error');
            });
        }

        function loadPairedDevices() {
            fetch('/api/bluetooth/status')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('pairedList');
                if (data.connected) {
                    list.innerHTML = '<div class="device-item">' +
                        '<div><div class="device-name">' + data.connected.name + '</div>' +
                        '<div class="device-address">' + data.connected.address + '</div></div>' +
                        '<button class="btn btn-danger btn-small" onclick="disconnectDevice()">Disconnect</button>' +
                        '</div>';
                } else {
                    list.innerHTML = '<p style="color: #888;">No connected devices.</p>';
                }
            });
        }

        function disconnectDevice() {
            fetch('/api/bluetooth/disconnect', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                alert('Disconnected');
                loadPairedDevices();
            });
        }

        loadPairedDevices();
    </script>
</body>
</html>
