{% extends "base.html" %}
{% block title %}Configuration - Camp Tutor{% endblock %}

{% block content %}
<div class="card">
    <h2>Audio Settings</h2>
    <div class="control-group">
        <label>Volume</label>
        <input type="range" id="volume-slider" min="0" max="100" value="{{ volume }}">
        <div class="value-display"><span id="volume-value">{{ volume }}</span>%</div>
    </div>
    <div class="btn-group">
        <button class="btn btn-primary" onclick="setVolume()">Set Volume</button>
        <button class="btn btn-secondary" onclick="toggleMute()" id="mute-btn">{{ 'Unmute' if muted else 'Mute' }}</button>
    </div>
</div>

<div class="card">
    <h2>Age Group Settings</h2>
    <div class="btn-group">
        {% for ag in age_groups %}
        <button class="btn {% if ag.key == current_age_group %}btn-primary{% else %}btn-secondary{% endif %}" 
                onclick="selectAgeGroup('{{ ag.key }}')">
            {{ ag.display }}
        </button>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function setVolume() {
    const vol = document.getElementById('volume-slider').value;
    fetch('/api/volume', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({volume: parseInt(vol)})
    }).then(r => r.json()).then(d => {
        document.getElementById('volume-value').textContent = vol;
    });
}

function toggleMute() {
    fetch('/api/volume/mute', {method: 'POST'})
        .then(r => r.json())
        .then(d => {
            document.getElementById('mute-btn').textContent = d.muted ? 'Unmute' : 'Mute';
        });
}

function selectAgeGroup(key) {
    fetch('/api/age_group', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({age_group: key})
    }).then(r => r.json()).then(d => {
        location.reload();
    });
}
</script>
{% endblock %}
